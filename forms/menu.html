<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS-LAB - Menu</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 MS-LAB</h1>
            <div>
                <span class="user-greeting" id="userGreeting"></span>
                <button class="logout-btn" onclick="logout()">Sair</button>
            </div>
        </div>

        <div id="successMessage" class="message success"></div>
        <div id="errorMessage" class="message error"></div>

        <h2>Menu Principal</h2>
        <div class="menu-grid">
            <a href="operadores.html" class="menu-card">
                <h3>👥</h3>
                <p>Gerenciar Operadores</p>
            </a>
        </div>
        <div class="menu-grid">
            <a href="objetos.html" class="menu-card">
                <h3>📦</h3>
                <p>Gerenciar Objetos</p>
            </a>
        </div>
    </div>

    <script>
        function showMessage(message, type) {
            const container = type === 'success' ? document.getElementById('successMessage') : document.getElementById('errorMessage');
            container.textContent = message;
            container.style.display = 'block';
            setTimeout(() => {
                container.style.display = 'none';
            }, 3000);
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('login');
            localStorage.removeItem('name');
            localStorage.removeItem('userId');
            
            showMessage('Logout realizado com sucesso!', 'success');
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1200);
        }

        // Verificar autenticação e exibir saudação
        window.onload = function() {
            const token = localStorage.getItem('token');
            const login = localStorage.getItem('login');
            const name = localStorage.getItem('name');

            if (!token || !login) {
                window.location.href = 'index.html';
                return;
            }

            // Saudação personalizada
            if (name) {
                document.getElementById('userGreeting').textContent = `Bem-vindo, ${name}!`;
            } else {
                document.getElementById('userGreeting').textContent = `Bem-vindo!`;
            }
        };
    </script>
</body>
</html>
