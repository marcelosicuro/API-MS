<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS-LAB - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        .login-container {
            max-width: 420px;
            margin: 80px auto;
            background: #1f1f1f;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
            padding: 30px 0;
            text-align: center;
        }
        .form-control::placeholder {
            color: #8b8b8b;
        }
    </style>
</head>
<body class="bg-dark">
    <div class="container">
        <div class="login-container">
            <!-- Header -->
            <div class="login-header">
                <h1 class="mb-0">🚀 MS-LAB</h1>
                <p class="mb-0 opacity-75">Gestão de Laboratório</p>
            </div>

            <div class="p-4">
                <!-- Mensagens -->
                <div id="successMessage" class="alert alert-success d-none"></div>
                <div id="errorMessage" class="alert alert-danger d-none"></div>

                <!-- Abas -->
                <ul class="nav nav-tabs mb-4" id="authTabs">
                    <li class="nav-item">
                        <a class="nav-link active" data-bs-toggle="tab" href="#loginTab">Entrar</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-bs-toggle="tab" href="#registerTab">Criar Conta</a>
                    </li>
                </ul>

                <div class="tab-content">
                    <!-- ABA LOGIN -->
                    <div class="tab-pane fade show active" id="loginTab">
                        <div class="mb-3">
                            <label class="form-label">Login</label>
                            <input type="text" id="loginField" class="form-control" placeholder="Digite seu login">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Senha</label>
                            <input type="password" id="loginPassword" class="form-control" placeholder="Digite sua senha">
                        </div>
                        <button onclick="login()" id="btnLogin" class="btn btn-primary w-100 py-2">
                            <i class="fas fa-sign-in-alt"></i> Entrar
                        </button>
                    </div>

                    <!-- ABA REGISTRO -->
                    <div class="tab-pane fade" id="registerTab">
                        <div class="mb-3">
                            <label class="form-label">Login</label>
                            <input type="text" id="registerLogin" class="form-control" placeholder="Escolha um login">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Senha</label>
                            <input type="password" id="registerPassword" class="form-control" placeholder="Mínimo 6 caracteres">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Nome Completo</label>
                            <input type="text" id="registerName" class="form-control" placeholder="Seu nome completo">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="registerEmail" class="form-control" placeholder="seu@email.com">
                        </div>
                        <button onclick="register()" id="btnRegister" class="btn btn-success w-100 py-2">
                            <i class="fas fa-user-plus"></i> Registrar
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js"></script>
    <script>
        function showMessage(message, type) {
            const success = document.getElementById('successMessage');
            const error = document.getElementById('errorMessage');
            success.classList.add('d-none');
            error.classList.add('d-none');

            if (type === 'success') {
                success.textContent = message;
                success.classList.remove('d-none');
            } else {
                error.textContent = message;
                error.classList.remove('d-none');
            }

            setTimeout(() => {
                success.classList.add('d-none');
                error.classList.add('d-none');
            }, 5000);
        }

        // Registrar Log
        async function registrarLog(token, login, pagina) {
            try {
                await fetch(`${API_URL}/logs`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ pagina: pagina, operador: login })
                });
            } catch (e) {
                console.warn('Não foi possível registrar o log:', e);
            }
        }

        // ====================== LOGIN ======================
        async function login() {
            const btn = document.getElementById('btnLogin');
            btn.disabled = true;
            btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Entrando...`;

            const loginField = document.getElementById('loginField').value.trim();
            const senha = document.getElementById('loginPassword').value.trim();

            if (!loginField || !senha) {
                showMessage('Preencha login e senha', 'error');
                resetLoginButton();
                return;
            }

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login: loginField, senha })
                });

                const data = await response.json();

                if (!response.ok) {
                    showMessage(data.error || 'Credenciais inválidas', 'error');
                    return;
                }

                // Buscar nome + permissão
                const resUsuario = await fetch(`${API_URL}/operadores/getNomeUsuario/${loginField}`, {
                    headers: { 'Authorization': `Bearer ${data.token}` }
                });

                let usuario = null;
                if (resUsuario.ok) {
                    usuario = await resUsuario.json();
                }

                // Salvar no localStorage
                localStorage.setItem('token', data.token);
                localStorage.setItem('login', loginField);
                localStorage.setItem('name', usuario?.nome || loginField);
                localStorage.setItem('permissao_nome', usuario?.permissao_nome || 'Operador');

                showMessage('Login realizado com sucesso!', 'success');

                await registrarLog(data.token, loginField, 'Login');

                setTimeout(() => {
                    window.location.href = 'menu.html';
                }, 800);

            } catch (error) {
                console.error('Erro no login:', error);
                showMessage('Erro de conexão com o servidor', 'error');
            } finally {
                resetLoginButton();
            }
        }

        function resetLoginButton() {
            const btn = document.getElementById('btnLogin');
            btn.disabled = false;
            btn.innerHTML = `<i class="fas fa-sign-in-alt"></i> Entrar`;
        }

        // Enter para login
        document.getElementById('loginPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
