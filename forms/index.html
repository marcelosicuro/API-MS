<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API-MS - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Mensagens -->
        <div id="successMessage" class="message success"></div>
        <div id="errorMessage" class="message error"></div>

        <!-- TELA 1: LOGIN -->
        <div id="loginScreen" class="screen active">
            <h1>🔐 API-MS</h1>
            <h2>Entrar</h2>
            <div class="form-group">
                <label>Usuário:</label>
                <input type="text" id="loginUsername" placeholder="Digite seu usuário">
            </div>
            <div class="form-group">
                <label>Senha:</label>
                <input type="password" id="loginPassword" placeholder="Digite sua senha">
            </div>
            <button onclick="login()">Entrar</button>
            <div class="link-text" onclick="showScreen('registerScreen')">Não tem conta? Registrar</div>
        </div>

        <!-- TELA 2: REGISTRO -->
        <div id="registerScreen" class="screen">
            <h1>📝 API-MS</h1>
            <h2>Criar Conta</h2>
            <div class="form-group">
                <label>Usuário:</label>
                <input type="text" id="registerUsername" placeholder="Digite seu usuário">
            </div>
            <div class="form-group">
                <label>Senha:</label>
                <input type="password" id="registerPassword" placeholder="Digite sua senha">
            </div>
            <div class="form-group">
                <label>Nome:</label>
                <input type="text" id="registerName" placeholder="Digite seu nome">
            </div>
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="registerEmail" placeholder="Digite seu email">
            </div>
            <button onclick="register()">Registrar</button>
            <div class="link-text" onclick="showScreen('loginScreen')">Já tem conta? Entrar</div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000';

        function showScreen(screenName) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(screenName).classList.add('active');
        }

        function showMessage(message, type) {
            const container = type === 'success' ? document.getElementById('successMessage') : document.getElementById('errorMessage');
            container.textContent = message;
            container.style.display = 'block';
            setTimeout(() => {
                container.style.display = 'none';
            }, 3000);
        }

        async function checkUsernameAvailability(username) {
            try {
                const response = await fetch(`${API_URL}/check-username/${username}`);
                const data = await response.json();
                return !data.exists;
            } catch (error) {
                return true; // Se não conseguir verificar, permite continuar
            }
        }

        async function register() {
            const username = document.getElementById('registerUsername').value.trim();
            const password = document.getElementById('registerPassword').value.trim();
            const name = document.getElementById('registerName').value.trim();
            const email = document.getElementById('registerEmail').value.trim();

            if (!username || !password || !name || !email) {
                showMessage('Preencha todos os campos', 'error');
                return;
            }

            if (username.length < 3) {
                showMessage('Username deve ter no mínimo 3 caracteres', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('Senha deve ter no mínimo 6 caracteres', 'error');
                return;
            }

            // Verificar se username já existe
            const isAvailable = await checkUsernameAvailability(username);
            if (!isAvailable) {
                showMessage('Username já cadastrado. Tente outro.', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, name, email })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('Usuário registrado com sucesso! Agora faça login.', 'success');
                    document.getElementById('registerUsername').value = '';
                    document.getElementById('registerPassword').value = '';
                    document.getElementById('registerName').value = '';
                    document.getElementById('registerEmail').value = '';
                    setTimeout(() => showScreen('loginScreen'), 2000);
                } else {
                    showMessage(data.error || 'Erro ao registrar', 'error');
                }
            } catch (error) {
                showMessage('Erro de conexão: ' + error.message, 'error');
            }
        }

        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showMessage('Preencha usuário e senha', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', username);
                    showMessage('Login realizado com sucesso!', 'success');
                    setTimeout(() => {
                        window.location.href = 'menu.html';
                    }, 1500);
                } else {
                    showMessage(data.error || 'Erro ao fazer login', 'error');
                }
            } catch (error) {
                showMessage('Erro de conexão: ' + error.message, 'error');
            }
        }

        // Verificar se já está autenticado
        window.onload = function() {
            if (localStorage.getItem('token')) {
                window.location.href = 'menu.html';
            }
        };
    </script>
</body>
</html>
