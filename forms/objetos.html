<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS-LAB - Objetos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
    <div class="d-flex">
        <!-- SIDEBAR -->
        <div class="sidebar col-2">
            <div class="px-3 py-4">
                <h4 class="text-center mb-4">🚀 MS-LAB</h4>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a href="menu.html" class="nav-link"><i class="fas fa-home me-2"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a href="operadores.html" class="nav-link"><i class="fas fa-users me-2"></i> Operadores</a>
                    </li>
                    <li class="nav-item">
                        <a href="objetos.html" class="nav-link active"><i class="fas fa-box me-2"></i> Objetos</a>
                    </li>
                    <li class="nav-item">
                        <a href="logs.html" class="nav-link"><i class="fas fa-history me-2"></i> Logs</a>
                    </li>
                </ul>
            </div>
        </div>

        <!-- CONTEÚDO PRINCIPAL -->
        <div class="flex-grow-1">
            <nav class="top-navbar navbar navbar-expand-lg navbar-dark px-4 py-3">
                <div class="container-fluid">
                    <h5 class="text-white mb-0">Gerenciar Objetos / Inventário</h5>
                    <div class="d-flex align-items-center">
                        <span class="text-white me-3" id="userGreeting"></span>
                        <button class="btn btn-danger btn-sm" onclick="logout()">
                            <i class="fas fa-sign-out-alt"></i> Sair
                        </button>
                    </div>
                </div>
            </nav>

            <div class="content-area">
                <div class="container-fluid">
                    <div id="successMessage" class="alert alert-success d-none"></div>
                    <div id="errorMessage" class="alert alert-danger d-none"></div>

                    <div class="card admin-card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">Lista de Objetos</h5>
                            <button class="btn btn-success" onclick="openCreateModal()">
                                <i class="fas fa-plus"></i> Novo Objeto
                            </button>
                        </div>
                        <div class="card-body">
                            <div class="input-group mb-3">
                                <input type="text" id="filtro" class="form-control" 
                                       placeholder="Filtrar por nome do objeto..." 
                                       onkeyup="if(event.key === 'Enter') listObjetos()">
                                <button class="btn btn-primary" onclick="listObjetos()">
                                    <i class="fas fa-search"></i> Buscar
                                </button>
                            </div>

                            <div class="table-responsive">
                                <table class="table table-hover" id="objetosTable">
                                    <thead class="table-light">
                                        <tr>
                                            <th>ID</th>
                                            <th>Nome do Objeto</th>
                                            <th>Quantidade</th>
                                            <th>Valor Unitário</th>
                                            <th>Valor Total</th>
                                            <th>Ações</th>
                                        </tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Criar Objeto -->
    <div class="modal fade" id="createModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Novo Objeto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Nome do Objeto</label>
                        <input type="text" id="createNomeObjeto" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Quantidade</label>
                        <input type="number" id="createQuantidade" class="form-control" min="0" value="1">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Valor Unitário (R$)</label>
                        <input type="number" id="createValor" class="form-control" step="0.01" min="0" value="0">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="createObjeto()">Criar Objeto</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Editar Objeto -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar Objeto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Nome do Objeto</label>
                        <input type="text" id="editNomeObjeto" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Quantidade</label>
                        <input type="number" id="editQuantidade" class="form-control" min="0">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Valor Unitário (R$)</label>
                        <input type="number" id="editValor" class="form-control" step="0.01" min="0">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="saveObjeto()">Salvar Alterações</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'http://localhost:3000';
        let currentEditObjetoId = null;

        function showMessage(message, type) {
            const success = document.getElementById('successMessage');
            const error = document.getElementById('errorMessage');
            success.classList.add('d-none');
            error.classList.add('d-none');
            
            if (type === 'success') {
                success.textContent = message;
                success.classList.remove('d-none');
            } else {
                error.textContent = message;
                error.classList.remove('d-none');
            }
            setTimeout(() => {
                success.classList.add('d-none');
                error.classList.add('d-none');
            }, 4000);
        }

        async function listObjetos() {
            const token = localStorage.getItem('token');
            if (!token) return window.location.href = 'index.html';

            const filtro = document.getElementById('filtro').value.trim();

            try {
                const response = await fetch(`${API_URL}/objetos`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${token}`, 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({ filtro })
                });

                if (response.status === 401) {
                    localStorage.clear();
                    window.location.href = 'index.html';
                    return;
                }

                const objetos = await response.json();
                const tbody = document.querySelector('#objetosTable tbody');
                tbody.innerHTML = '';

                if (objetos.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4">Nenhum objeto encontrado.</td></tr>`;
                    return;
                }

                objetos.forEach(obj => {
                    const valorTotal = (obj.quantidade * obj.valor).toLocaleString('pt-BR', {minimumFractionDigits: 2});
                    const row = `
                        <tr>
                            <td>${obj.id}</td>
                            <td><strong>${obj.nomeobjeto}</strong></td>
                            <td class="text-center">${Number(obj.quantidade).toLocaleString('pt-BR')}</td>
                            <td>R$ ${Number(obj.valor).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                            <td><strong>R$ ${valorTotal}</strong></td>
                            <td>
                                <button class="btn btn-sm btn-warning me-1" 
                                        onclick="openEditModal(${obj.id}, '${obj.nomeobjeto}', ${obj.quantidade}, ${obj.valor})">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="btn btn-sm btn-danger" onclick="deleteObjeto(${obj.id})">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            } catch (error) {
                console.error(error);
                showMessage('Erro ao carregar objetos', 'error');
            }
        }

        function openCreateModal() {
            document.getElementById('createNomeObjeto').value = '';
            document.getElementById('createQuantidade').value = '1';
            document.getElementById('createValor').value = '0';
            new bootstrap.Modal(document.getElementById('createModal')).show();
        }

        async function createObjeto() {
            const nomeobjeto = document.getElementById('createNomeObjeto').value.trim();
            const quantidade = document.getElementById('createQuantidade').value || 0;
            const valor = document.getElementById('createValor').value || 0;

            if (!nomeobjeto) return showMessage('Nome do objeto é obrigatório', 'error');

            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`${API_URL}/objetos/incluirObjeto`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ nomeobjeto, quantidade, valor })
                });

                if (response.ok) {
                    showMessage('Objeto criado com sucesso!', 'success');
                    bootstrap.Modal.getInstance(document.getElementById('createModal')).hide();
                    listObjetos();
                } else {
                    const data = await response.json();
                    showMessage(data.error || 'Erro ao criar objeto', 'error');
                }
            } catch (error) {
                showMessage('Erro de conexão', 'error');
            }
        }

        function openEditModal(id, nome, quantidade, valor) {
            currentEditObjetoId = id;
            document.getElementById('editNomeObjeto').value = nome;
            document.getElementById('editQuantidade').value = quantidade;
            document.getElementById('editValor').value = valor;
            new bootstrap.Modal(document.getElementById('editModal')).show();
        }

        async function saveObjeto() {
            const token = localStorage.getItem('token');
            const nomeobjeto = document.getElementById('editNomeObjeto').value.trim();
            const quantidade = document.getElementById('editQuantidade').value || 0;
            const valor = document.getElementById('editValor').value || 0;

            if (!nomeobjeto) return showMessage('Nome do objeto é obrigatório', 'error');

            try {
                const response = await fetch(`${API_URL}/objetos/${currentEditObjetoId}`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify({ nomeobjeto, quantidade, valor })
                });

                if (response.ok) {
                    showMessage('Objeto atualizado com sucesso!', 'success');
                    bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
                    listObjetos();
                } else {
                    const data = await response.json();
                    showMessage(data.error || 'Erro ao atualizar', 'error');
                }
            } catch (error) {
                showMessage('Erro de conexão', 'error');
            }
        }

        async function deleteObjeto(id) {
            if (!confirm('Tem certeza que deseja excluir este objeto?')) return;

            const token = localStorage.getItem('token');
            try {
                const response = await fetch(`${API_URL}/objetos/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    showMessage('Objeto deletado com sucesso!', 'success');
                    listObjetos();
                } else {
                    showMessage('Erro ao deletar objeto', 'error');
                }
            } catch (error) {
                showMessage('Erro de conexão', 'error');
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        window.onload = function() {
            const token = localStorage.getItem('token');
            if (!token) return window.location.href = 'index.html';
            
            listObjetos();

            const name = localStorage.getItem('name');
            if (name) document.getElementById('userGreeting').textContent = `👋 ${name}`;
        };
    </script>
</body>
</html>
