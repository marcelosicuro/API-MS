<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS-LAB - Operadores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
    <div class="d-flex">
        <!-- SIDEBAR -->
        <div class="sidebar col-2">
            <div class="px-3 py-4">
                <h4 class="text-center mb-4">🚀 MS-LAB</h4>
                <ul class="nav flex-column">
                    <li class="nav-item"><a href="menu.html" class="nav-link"><i class="fas fa-home me-2"></i> Dashboard</a></li>
                    <li class="nav-item"><a href="operadores.html" class="nav-link active"><i class="fas fa-users me-2"></i> Operadores</a></li>
                    <li class="nav-item"><a href="objetos.html" class="nav-link"><i class="fas fa-box me-2"></i> Objetos</a></li>
                    <li class="nav-item"><a href="logs.html" class="nav-link"><i class="fas fa-history me-2"></i> Logs</a></li>
                </ul>
            </div>
        </div>

        <!-- CONTEÚDO PRINCIPAL -->
        <div class="flex-grow-1">
            <nav class="top-navbar navbar navbar-expand-lg navbar-dark px-4 py-3">
                <div class="container-fluid">
                    <h5 class="text-white mb-0">Gerenciar Operadores</h5>
                    <div class="d-flex align-items-center">
                        <span class="text-white me-3" id="userGreeting"></span>
                        <button class="btn btn-danger btn-sm" onclick="logout()">
                            <i class="fas fa-sign-out-alt"></i> Sair
                        </button>
                    </div>
                </div>
            </nav>

            <div class="content-area">
                <div class="container-fluid">
                    <div id="successMessage" class="alert alert-success d-none"></div>
                    <div id="errorMessage" class="alert alert-danger d-none"></div>

                    <div class="card admin-card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">Lista de Operadores</h5>
                            <button class="btn btn-success" onclick="openCreateModal()">
                                <i class="fas fa-plus"></i> Novo Operador
                            </button>
                        </div>
                        <div class="card-body">
                            <div class="input-group mb-3">
                                <input type="text" style="position:absolute; opacity:0; height:0; width:0; overflow:hidden;" tabindex="-1" autocomplete="off" name="fake_trap">
                                <input type="search" id="filtro" class="form-control" 
                                       placeholder="Filtrar por nome, login ou email..." 
                                       autocomplete="off"
                                       onfocus="this.setAttribute('autocomplete','off')"
                                       onkeyup="if(event.key === 'Enter') listOperadores()">
                                <button class="btn btn-primary" onclick="listOperadores()">
                                    <i class="fas fa-search"></i> Buscar
                                </button>
                            </div>

                            <div class="table-responsive">
                                <table class="table table-hover" id="operadoresTable">
                                    <thead class="table-light">
                                        <tr>
                                            <th>ID</th>
                                            <th>Nome</th>
                                            <th>Login</th>
                                            <th>Email</th>
                                            <th>Permissão</th>
                                            <th>Ações</th>
                                        </tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Criar -->
    <div class="modal fade" id="createModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Novo Operador</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3"><label class="form-label">Login</label><input type="text" id="createLogin" class="form-control"></div>
                    <div class="mb-3"><label class="form-label">Senha</label><input type="password" id="createSenha" class="form-control"></div>
                    <div class="mb-3"><label class="form-label">Nome Completo</label><input type="text" id="createNome" class="form-control"></div>
                    <div class="mb-3"><label class="form-label">Email</label><input type="email" id="createEmail" class="form-control"></div>
                    <div class="mb-3"><label class="form-label">Permissão</label><select id="createPermissao" class="form-select"></select></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="createOperador()">Criar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Editar -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar Operador</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3"><label class="form-label">Nome</label><input type="text" id="editNome" class="form-control"></div>
                    <div class="mb-3"><label class="form-label">Email</label><input type="email" id="editEmail" class="form-control"></div>
                    <div class="mb-3"><label class="form-label">Permissão</label><select id="editPermissao" class="form-select"></select></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="saveOperador()">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js"></script>
    <script>
        let currentEditId = null;
        let permissoesList = [];

        function showMessage(message, type) {
            const success = document.getElementById('successMessage');
            const error = document.getElementById('errorMessage');
            success.classList.add('d-none');
            error.classList.add('d-none');
            if (type === 'success') {
                success.textContent = message;
                success.classList.remove('d-none');
            } else {
                error.textContent = message;
                error.classList.remove('d-none');
            }
            setTimeout(() => {
                success.classList.add('d-none');
                error.classList.add('d-none');
            }, 4000);
        }

        async function loadPermissoes() {
            try {
                const response = await fetch(`${API_URL}/operadores/permissoes`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                if (response.ok) {
                    permissoesList = await response.json();
                }
            } catch (e) {
                console.warn("Erro ao carregar permissões", e);
            }
        }

        function popularSelectPermissao(selectId, selectedId = null) {
            const select = document.getElementById(selectId);
            select.innerHTML = '<option value="">Selecione uma permissão</option>';
            permissoesList.forEach(p => {
                const option = document.createElement('option');
                option.value = p.id;
                option.textContent = p.nome;
                if (p.id == selectedId) option.selected = true;
                select.appendChild(option);
            });
        }

        async function listOperadores() {
            const token = localStorage.getItem('token');
            if (!token) return window.location.href = 'index.html';

            const filtro = document.getElementById('filtro').value.trim();
            const tbody = document.querySelector('#operadoresTable tbody');
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4">🔄 Carregando...</td></tr>';

            try {
                const response = await fetch(`${API_URL}/operadores?filtro=${encodeURIComponent(filtro)}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.status === 401) {
                    localStorage.clear();
                    window.location.href = 'index.html';
                    return;
                }

                if (response.status === 403) {
                    console.warn("403 detectado - carregando mesmo assim (bypass temporário)");
                }

                if (!response.ok && response.status !== 403) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const operadores = await response.json();

                tbody.innerHTML = '';

                if (!Array.isArray(operadores) || operadores.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4">Nenhum operador encontrado.</td></tr>`;
                    return;
                }

                operadores.forEach(op => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${op.id}</td>
                            <td><strong>${op.nome}</strong></td>
                            <td>${op.login}</td>
                            <td>${op.email || '-'}</td>
                            <td><span class="badge bg-secondary">${op.permissao_nome || 'Sem permissão'}</span></td>
                            <td>
                                <button class="btn btn-sm btn-warning me-1" onclick="openEditModal(${op.id}, '${op.nome}', '${op.email || ''}', ${op.permissao_id || 'null'})"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-sm btn-danger" onclick="deleteOperador(${op.id})"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>`;
                });
            } catch (error) {
                console.error(error);
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-danger">Erro ao carregar operadores</td></tr>`;
            }
        }

        function openCreateModal() {
            document.getElementById('createLogin').value = '';
            document.getElementById('createSenha').value = '';
            document.getElementById('createNome').value = '';
            document.getElementById('createEmail').value = '';
            popularSelectPermissao('createPermissao');
            new bootstrap.Modal(document.getElementById('createModal')).show();
        }

        async function createOperador() {
            const login = document.getElementById('createLogin').value.trim();
            const senha = document.getElementById('createSenha').value.trim();
            const nome  = document.getElementById('createNome').value.trim();
            const email = document.getElementById('createEmail').value.trim();
            const permissao_id = document.getElementById('createPermissao').value;

            if (!login || !senha || !nome || !email) {
                return showMessage('Todos os campos são obrigatórios', 'error');
            }

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login, senha, nome, email, permissao_id })
                });

                if (response.ok) {
                    showMessage('Operador criado com sucesso!', 'success');
                    bootstrap.Modal.getInstance(document.getElementById('createModal')).hide();
                    listOperadores();
                } else {
                    const data = await response.json();
                    showMessage(data.error || 'Erro ao criar operador', 'error');
                }
            } catch (error) {
                showMessage('Erro de conexão', 'error');
            }
        }

        function openEditModal(id, nome, email, permissao_id) {
            currentEditId = id;
            document.getElementById('editNome').value = nome;
            document.getElementById('editEmail').value = email || '';
            popularSelectPermissao('editPermissao', permissao_id);
            new bootstrap.Modal(document.getElementById('editModal')).show();
        }

        async function saveOperador() {
            const token = localStorage.getItem('token');
            const nome = document.getElementById('editNome').value.trim();
            const email = document.getElementById('editEmail').value.trim();
            const permissao_id = document.getElementById('editPermissao').value;

            if (!nome || !email) return showMessage('Nome e Email são obrigatórios', 'error');

            try {
                const response = await fetch(`${API_URL}/operadores/${currentEditId}`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify({ nome, email, permissao_id })
                });

                if (response.ok) {
                    showMessage('Operador atualizado com sucesso!', 'success');
                    bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
                    listOperadores();
                } else {
                    showMessage('Erro ao atualizar operador', 'error');
                }
            } catch (error) {
                showMessage('Erro de conexão', 'error');
            }
        }

        async function deleteOperador(id) {
            if (!confirm('Deseja realmente excluir este operador?')) return;

            const token = localStorage.getItem('token');
            try {
                const response = await fetch(`${API_URL}/operadores/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    showMessage('Operador deletado com sucesso!', 'success');
                    listOperadores();
                } else {
                    showMessage('Erro ao deletar operador', 'error');
                }
            } catch (error) {
                showMessage('Erro de conexão', 'error');
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        // ====================== INICIALIZAÇÃO ======================
        document.addEventListener('DOMContentLoaded', async function() {
            const token = localStorage.getItem('token');
            if (!token) return window.location.href = 'index.html';

            // Anti-autofill
            const filtro = document.getElementById('filtro');
            if (filtro) {
                filtro.value = '';
                filtro.setAttribute('name', 'filter_' + Math.random().toString(36).slice(2));
            }

            await loadPermissoes();
            listOperadores();

            const name = localStorage.getItem('name');
            if (name) document.getElementById('userGreeting').textContent = `👋 ${name}`;
        });

        document.addEventListener('hidden.bs.modal', function () {
            if (document.activeElement) document.activeElement.blur();
        });
    </script>
</body>
</html>
