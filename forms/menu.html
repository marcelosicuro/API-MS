<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS-LAB - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
    <div class="d-flex">
        <!-- SIDEBAR -->
        <div class="sidebar col-2">
            <div class="px-3 py-4">
                <h4 class="text-center mb-4">🚀 MS-LAB</h4>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a href="menu.html" class="nav-link active"><i class="fas fa-home me-2"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a href="operadores.html" class="nav-link"><i class="fas fa-users me-2"></i> Operadores</a>
                    </li>
                    <li class="nav-item">
                        <a href="objetos.html" class="nav-link"><i class="fas fa-box me-2"></i> Objetos</a>
                    </li>
                    <li class="nav-item">
                        <a href="logs.html" class="nav-link"><i class="fas fa-history me-2"></i> Logs</a>
                    </li>
                </ul>
            </div>
        </div>

        <!-- CONTEÚDO PRINCIPAL -->
        <div class="flex-grow-1">
            <!-- Top Navbar -->
            <nav class="top-navbar navbar navbar-expand-lg navbar-dark px-4 py-3">
                <div class="container-fluid">
                    <h5 class="text-white mb-0">Painel Administrativo</h5>
                    <div class="d-flex align-items-center">
                        <span class="text-white me-3" id="userGreeting"></span>
                        <button class="btn btn-danger btn-sm" onclick="logout()">
                            <i class="fas fa-sign-out-alt"></i> Sair
                        </button>
                    </div>
                </div>
            </nav>

            <div class="content-area">
                <div class="container-fluid">
                    
                    <div class="row mt-4">
                        <div class="col-md-4">
                            <div class="card admin-card text-white bg-primary">
                                <div class="card-body">
                                    <h5><i class="fas fa-box"></i> Total de Objetos</h5>
                                    <h3 id="totalObjetos">0</h3>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card admin-card text-white bg-success">
                                <div class="card-body">
                                    <h5><i class="fas fa-users"></i> Operadores</h5>
                                    <h3 id="totalOperadores">0</h3>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card admin-card text-white bg-warning">
                                <div class="card-body">
                                    <h5><i class="fas fa-dollar-sign"></i> Valor Total</h5>
                                    <h3 id="valorTotal">R$ 0,00</h3>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        window.onload = function() {
            const name = localStorage.getItem('name');
            if (name) {
                document.getElementById('userGreeting').textContent = `👋 ${name}`;
            }
            // Aqui você pode adicionar chamadas para atualizar os cards
        };
    </script>
</body>
</html>
