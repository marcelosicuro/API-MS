<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS-LAB - Operadores</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header-menu">
            <h1>👥 Operadores</h1>
            <div class="header-actions">
                <a href="menu.html" class="back-btn">← Voltar</a>
                <button class="logout-btn" onclick="logout()">Sair</button>
            </div>
        </div>

        <div id="successMessage" class="message success"></div>
        <div id="errorMessage" class="message error"></div>

        <h2>Gerenciar Operadores</h2>

        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button class="load-btn" style="flex: 1;" onclick="listOperadores()">🔄 Carregar Operadores</button>
            <button class="load-btn" style="flex: 1; background: #27ae60;" onclick="openCreateModal()">➕ Novo Operador</button>
        </div>

        <div class="user-list" id="operadorList"></div>
    </div>

    <!-- Modal Criar Novo Operador -->
    <div id="createModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeCreateModal()">&times;</span>
            <h2>Criar Novo Operador</h2>
            <div class="form-group">
                <label>Login:</label>
                <input type="text" id="createLogin" placeholder="Digite o login">
            </div>
            <div class="form-group">
                <label>Senha:</label>
                <input type="password" id="createSenha" placeholder="Digite uma senha">
            </div>
            <div class="form-group">
                <label>Nome Completo:</label>
                <input type="text" id="createNome" placeholder="Digite o nome">
            </div>
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="createEmail" placeholder="Digite o email">
            </div>
            <div class="modal-buttons">
                <button class="btn-save" onclick="createOperador()">Criar</button>
                <button class="btn-cancel" onclick="closeCreateModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Modal Editar Operador -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeEditModal()">&times;</span>
            <h2>Editar Operador</h2>
            <div class="form-group">
                <label>Nome:</label>
                <input type="text" id="editNome">
            </div>
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="editEmail">
            </div>
            <div class="modal-buttons">
                <button class="btn-save" onclick="saveOperador()">Salvar</button>
                <button class="btn-cancel" onclick="closeEditModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000';
        let currentEditId = null;

        function showMessage(message, type) {
            const container = type === 'success' ? document.getElementById('successMessage') : document.getElementById('errorMessage');
            container.textContent = message;
            container.style.display = 'block';
            setTimeout(() => container.style.display = 'none', 3000);
        }

        async function listOperadores() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/operador`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const operadores = await response.json();

                let html = '';
                operadores.forEach(op => {
                    html += `
                        <div class="user-item">
                            <div class="user-info">
                                <p><strong>${op.nome}</strong></p>
                                <p>Login: ${op.login}</p>
                                <p>ID: ${op.id}</p>
                                <p>Email: ${op.email}</p>
                                ${op.codigo ? `<p>Código: ${op.codigo}</p>` : ''}
                            </div>
                            <div class="user-actions">
                                <button class="btn-edit" onclick="openEditModal(${op.id}, '${op.nome}', '${op.email}')">Editar</button>
                                <button class="btn-delete" onclick="deleteOperador(${op.id})">Deletar</button>
                            </div>
                        </div>
                    `;
                });

                document.getElementById('operadorList').innerHTML = html || '<p>Nenhum operador encontrado.</p>';
            } catch (error) {
                showMessage('Erro ao carregar operadores', 'error');
            }
        }

        function openEditModal(id, nome, email) {
            currentEditId = id;
            document.getElementById('editNome').value = nome;
            document.getElementById('editEmail').value = email;
            document.getElementById('editModal').style.display = 'block';
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        function openCreateModal() {
            document.getElementById('createLogin').value = '';
            document.getElementById('createSenha').value = '';
            document.getElementById('createNome').value = '';
            document.getElementById('createEmail').value = '';
            document.getElementById('createModal').style.display = 'block';
        }

        function closeCreateModal() {
            document.getElementById('createModal').style.display = 'none';
        }

        async function createOperador() {
            const login   = document.getElementById('createLogin').value.trim();
            const senha   = document.getElementById('createSenha').value.trim();
            const nome    = document.getElementById('createNome').value.trim();
            const email   = document.getElementById('createEmail').value.trim();

            if (!login || !senha || !nome || !email) {
                return showMessage('Todos os campos são obrigatórios', 'error');
            }

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login, senha, nome, email})
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('Operador criado com sucesso!', 'success');
                    closeCreateModal();
                    listOperadores();
                } else {
                    showMessage(data.error || 'Erro ao criar operador', 'error');
                }
            } catch (error) {
                showMessage('Erro de conexão', 'error');
            }
        }

        async function saveOperador() {
            const token = localStorage.getItem('token');
            const nome = document.getElementById('editNome').value.trim();
            const email = document.getElementById('editEmail').value.trim();

            if (!nome || !email) return showMessage('Nome e Email são obrigatórios', 'error');

            try {
                const response = await fetch(`${API_URL}/operador/${currentEditId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ nome, email })
                });

                if (response.ok) {
                    showMessage('Operador atualizado com sucesso!', 'success');
                    closeEditModal();
                    listOperadores();
                } else {
                    showMessage('Erro ao atualizar operador', 'error');
                }
            } catch (error) {
                showMessage('Erro de conexão', 'error');
            }
        }

        async function deleteOperador(id) {
            if (!confirm('Tem certeza que deseja excluir este operador?')) return;

            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`${API_URL}/operador/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    showMessage('Operador deletado com sucesso!', 'success');
                    listOperadores();
                } else {
                    showMessage('Erro ao deletar operador', 'error');
                }
            } catch (error) {
                showMessage('Erro de conexão', 'error');
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        // Fechar modais ao clicar fora
        window.onclick = function(event) {
            const editModal = document.getElementById('editModal');
            const createModal = document.getElementById('createModal');
            if (event.target === editModal) closeEditModal();
            if (event.target === createModal) closeCreateModal();
        };

        // Carregar lista ao abrir a página
        window.onload = function() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'index.html';
            } else {
                listOperadores();
            }
        };
    </script>
</body>
</html>
