<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS-LAB - Objetos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header-menu">
            <h1>📦 Objetos</h1>
            <div class="header-actions">
                <a href="menu.html" class="back-btn">← Voltar</a>
                <button class="logout-btn" onclick="logout()">Sair</button>
            </div>
        </div>

        <div id="successMessage" class="message success"></div>
        <div id="errorMessage" class="message error"></div>

        <h2>Gerenciar Objetos</h2>

        <div class="form-group">
            <label>Filtro por nome:</label>
            <input type="text" id="filtro" placeholder="Digite o nome do objeto...">
        </div>
        
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button class="load-btn" style="flex: 1;" onclick="listObjetos()">🔎 Filtrar</button>
            <button class="load-btn" style="flex: 1; background: #27ae60;" onclick="openCreateModal()">➕ Novo Objeto</button>
        </div>

        <div class="user-list" id="objetoList"></div>
    </div>

    <!-- Modal Criar -->
    <div id="createModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeCreateModal()">&times;</span>
            <h2>Criar Novo Objeto</h2>
            <div class="form-group">
                <label>Nome do Objeto:</label>
                <input type="text" id="createNomeObjeto" placeholder="Ex: Microscópio">
            </div>
            <div class="form-group">
                <label>Quantidade:</label>
                <input type="number" id="createQuantidade" placeholder="0" min="0">
            </div>
            <div class="form-group">
                <label>Valor Unitário (R$):</label>
                <input type="number" id="createValor" placeholder="0.00" step="0.01" min="0">
            </div>
            <div class="modal-buttons">
                <button class="btn-save" onclick="createObjeto()">Criar</button>
                <button class="btn-cancel" onclick="closeCreateModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Modal Editar -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeEditModal()">&times;</span>
            <h2>Editar Objeto</h2>
            <div class="form-group">
                <label>Nome do Objeto:</label>
                <input type="text" id="editNomeObjeto">
            </div>
            <div class="form-group">
                <label>Quantidade:</label>
                <input type="number" id="editQuantidade" min="0">
            </div>
            <div class="form-group">
                <label>Valor Unitário (R$):</label>
                <input type="number" id="editValor" step="0.01" min="0">
            </div>
            <div class="modal-buttons">
                <button class="btn-save" onclick="saveObjeto()">Salvar</button>
                <button class="btn-cancel" onclick="closeEditModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000';
        let currentEditObjetoId = null;

        function showMessage(message, type) {
            const container = type === 'success' ? document.getElementById('successMessage') : document.getElementById('errorMessage');
            container.textContent = message;
            container.style.display = 'block';
            setTimeout(() => container.style.display = 'none', 3000);
        }

        async function listObjetos() {
            const token = localStorage.getItem('token');
            if (!token) return window.location.href = 'index.html';

            try {
                const filtro = document.getElementById('filtro').value.trim();
                const response = await fetch(`${API_URL}/objeto`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${token}`, 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({ filtro })
                });

                const objetos = await response.json();

                let html = '';
                objetos.forEach(obj => {
                    html += `
                        <div class="user-item">
                            <div class="user-info">
                                <p><strong>${obj.nomeobjeto}</strong></p>
                                <p>ID: ${obj.id}</p>
                                <p>Quantidade: ${Number(obj.quantidade).toLocaleString('pt-BR')}</p>
                                <p class="user-value">Valor: R$ ${Number(obj.valor).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                            </div>
                            <div class="user-actions">
                                <button class="btn-edit" onclick="openEditModal(${obj.id}, '${obj.nomeobjeto}', ${obj.quantidade}, ${obj.valor})">Editar</button>
                                <button class="btn-delete" onclick="deleteObjeto(${obj.id})">Deletar</button>
                            </div>
                        </div>
                    `;
                });

                document.getElementById('objetoList').innerHTML = html || '<p>Nenhum objeto encontrado.</p>';
            } catch (error) {
                showMessage('Erro ao carregar objetos', 'error');
            }
        }

        function openEditModal(id, nome, quantidade, valor) {
            currentEditObjetoId = id;
            document.getElementById('editNomeObjeto').value = nome;
            document.getElementById('editQuantidade').value = quantidade;
            document.getElementById('editValor').value = valor;
            document.getElementById('editModal').style.display = 'block';
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        function openCreateModal() {
            document.getElementById('createNomeObjeto').value = '';
            document.getElementById('createQuantidade').value = '';
            document.getElementById('createValor').value = '';
            document.getElementById('createModal').style.display = 'block';
        }

        function closeCreateModal() {
            document.getElementById('createModal').style.display = 'none';
        }

        async function createObjeto() {
            const nomeobjeto = document.getElementById('createNomeObjeto').value.trim();
            const quantidade = document.getElementById('createQuantidade').value;
            const valor = document.getElementById('createValor').value;

            if (!nomeobjeto) return showMessage('Nome do objeto é obrigatório', 'error');

            try {
                const response = await fetch(`${API_URL}/incluirObjeto`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nomeobjeto, quantidade, valor })
                });

                if (response.ok) {
                    showMessage('Objeto criado com sucesso!', 'success');
                    closeCreateModal();
                    listObjetos();
                } else {
                    const data = await response.json();
                    showMessage(data.error || 'Erro ao criar objeto', 'error');
                }
            } catch (error) {
                showMessage('Erro de conexão', 'error');
            }
        }

        async function saveObjeto() {
            const token = localStorage.getItem('token');
            const nomeobjeto = document.getElementById('editNomeObjeto').value.trim();
            const quantidade = document.getElementById('editQuantidade').value;
            const valor = document.getElementById('editValor').value;

            try {
                const response = await fetch(`${API_URL}/objeto/${currentEditObjetoId}`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify({ nomeobjeto, quantidade, valor })
                });

                if (response.ok) {
