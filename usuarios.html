<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API-MS - Usuários</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header-menu">
            <h1>👥 Usuários</h1>
            <div class="header-actions">
                <a href="menu.html" class="back-btn">← Voltar</a>
                <button class="logout-btn" onclick="logout()">Sair</button>
            </div>
        </div>

        <div id="successMessage" class="message success"></div>
        <div id="errorMessage" class="message error"></div>

        <h2>Gerenciar Usuários</h2>
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button class="load-btn" style="flex: 1;" onclick="listUsers()">Carregar Usuários</button>
            <button class="load-btn" style="flex: 1; background: #27ae60;" onclick="openCreateModal()">➕ Criar Novo</button>
        </div>
        <div class="user-list" id="userList"></div>
    </div>

    <!-- Modal para editar usuário -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeEditModal()">&times;</span>
            <h2>Editar Usuário</h2>
            <div class="form-group">
                <label>Nome:</label>
                <input type="text" id="editName" placeholder="Digite o novo nome">
            </div>
            <div class="form-group">
                <label>Email:</label>
                <input type="text" id="editEmail" placeholder="Digite um email">
            </div>
            <div class="modal-buttons">
                <button class="btn-save" onclick="saveUser()">Salvar</button>
                <button class="btn-cancel" onclick="closeEditModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Modal para criar novo usuário -->
    <div id="createModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeCreateModal()">&times;</span>
            <h2>Criar Novo Usuário</h2>
            <div class="form-group">
                <label>Nome de Usuário:</label>
                <input type="text" id="createUsername" placeholder="Digite o nome de usuário">
            </div>
            <div class="form-group">
                <label>Senha:</label>
                <input type="password" id="createPassword" placeholder="Digite uma senha">
            </div>
            <div class="form-group">
                <label>Nome:</label>
                <input type="text" id="createName" placeholder="Digite o nome completo">
            </div>
            <div class="form-group">
                <label>Email:</label>
                <input type="text" id="createEmail" placeholder="Digite um email">
            </div>
            <div class="modal-buttons">
                <button class="btn-save" onclick="createUser()">Criar</button>
                <button class="btn-cancel" onclick="closeCreateModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000';
        let currentEditUserId = null;

        function showMessage(message, type) {
            const container = type === 'success' ? document.getElementById('successMessage') : document.getElementById('errorMessage');
            container.textContent = message;
            container.style.display = 'block';
            setTimeout(() => {
                container.style.display = 'none';
            }, 3000);
        }

        async function listUsers() {
            const token = localStorage.getItem('token');

            if (!token) {
                showMessage('Token expirado. Faça login novamente.', 'error');
                setTimeout(() => window.location.href = 'index.html', 2000);
                return;
            }

            try {
                const response = await fetch(`${API_URL}/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const users = await response.json();

                if (response.ok) {
                    let html = '';
                    users.forEach(user => {
                        html += `
                            <div class="user-item">
                                <div class="user-info">
                                    <p><strong>${user.name}</strong></p>
                                    <p>Usuário: ${user.username}</p>
                                    <p>ID: ${user.id}</p>
                                    <p>Email: ${user.email}</p>
                                </div>
                                <div class="user-actions">
                                    <button class="btn-edit" onclick="openEditModal(${user.id}, '${user.name}', '${user.email}')">Editar</button>
                                    <button class="btn-delete" onclick="deleteUser(${user.id})">Deletar</button>
                                </div>
                            </div>
                        `;
                    });
                    document.getElementById('userList').innerHTML = html;
                    showMessage(`${users.length} usuário(s) carregado(s)`, 'success');
                } else {
                    showMessage('Erro ao carregar usuários', 'error');
                }
            } catch (error) {
                showMessage('Erro de conexão: ' + error.message, 'error');
            }
        }

        function openEditModal(userId, userName, userEmail) {
            currentEditUserId = userId;
            document.getElementById('editName').value = userName;
            document.getElementById('editEmail').value = userEmail;
            document.getElementById('editModal').style.display = 'block';
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
            currentEditUserId = null;
        }

        function openCreateModal() {
            document.getElementById('createUsername').value = '';
            document.getElementById('createPassword').value = '';
            document.getElementById('createName').value = '';
            document.getElementById('createEmail').value = '';
            document.getElementById('createModal').style.display = 'block';
        }

        function closeCreateModal() {
            document.getElementById('createModal').style.display = 'none';
        }

        async function checkUsernameAvailability(username) {
            try {
                const response = await fetch(`${API_URL}/check-username/${username}`);
                const data = await response.json();
                return !data.exists;
            } catch (error) {
                return true; // Se não conseguir verificar, permite continuar
            }
        }

        async function createUser() {
            const username = document.getElementById('createUsername').value.trim();
            const password = document.getElementById('createPassword').value.trim();
            const name = document.getElementById('createName').value.trim();
            const email = document.getElementById('createEmail').value.trim();


            if (!username || !password || !name) {
                showMessage('Preencha todos os campos obrigatórios', 'error');
                return;
            }

            if (username.length < 3) {
                showMessage('Username deve ter no mínimo 3 caracteres', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('A senha deve ter no mínimo 6 caracteres', 'error');
                return;
            }

            // Verificar se username já existe
            const isAvailable = await checkUsernameAvailability(username);
            if (!isAvailable) {
                showMessage('Username já cadastrado. Tente outro.', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, name, email })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('Usuário criado com sucesso!', 'success');
                    closeCreateModal();
                    listUsers();
                } else {
                    showMessage(data.error || 'Erro ao criar usuário', 'error');
                }
            } catch (error) {
                showMessage('Erro de conexão: ' + error.message, 'error');
            }
        }

        async function saveUser() {
            const token = localStorage.getItem('token');
            const newName = document.getElementById('editName').value;
            const newEmail = document.getElementById('editEmail').value;

            if (!newName) {
                showMessage('Digite um nome válido', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/users/${currentEditUserId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ name: newName, email : newEmail})
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('Usuário atualizado com sucesso!', 'success');
                    closeEditModal();
                    listUsers();
                } else {
                    showMessage(data.error || 'Erro ao atualizar usuário', 'error');
                }
            } catch (error) {
                showMessage('Erro de conexão: ' + error.message, 'error');
            }
        }

        async function deleteUser(userId) {
            if (!confirm('Tem certeza que deseja deletar este usuário?')) {
                return;
            }

            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`${API_URL}/users/${userId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('Usuário deletado com sucesso!', 'success');
                    listUsers();
                } else {
                    showMessage(data.error || 'Erro ao deletar usuário', 'error');
                }
            } catch (error) {
                showMessage('Erro de conexão: ' + error.message, 'error');
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            showMessage('Saiu com sucesso', 'success');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        }

        // Fechar modal ao clicar fora
        window.onclick = function(event) {
            const editModal = document.getElementById('editModal');
            const createModal = document.getElementById('createModal');
            if (event.target == editModal) {
                editModal.style.display = 'none';
            }
            if (event.target == createModal) {
                createModal.style.display = 'none';
            }
        };

        // Permitir Enter para criar usuário
        document.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                const createModal = document.getElementById('createModal');
                if (createModal && createModal.style.display === 'block') {
                    createUser();
                }
            }
        });

        // Verificar se está autenticado
        window.onload = function() {
            const token = localStorage.getItem('token');
            const username = localStorage.getItem('username');

            if (!token || !username) {
                window.location.href = 'index.html';
                return;
            }
        };
    </script>
</body>
</html>
