<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS-LAB - Operadores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
    <div class="d-flex">
        <div class="sidebar col-2">
            <div class="px-3 py-4">
                <h4 class="text-center mb-4">🚀 MS-LAB</h4>
                <ul class="nav flex-column">
                    <li class="nav-item"><a href="menu.html" class="nav-link"><i class="fas fa-home me-2"></i> Dashboard</a></li>
                    <li class="nav-item"><a href="operadores.html" class="nav-link active"><i class="fas fa-users me-2"></i> Operadores</a></li>
                    <li class="nav-item"><a href="objetos.html" class="nav-link"><i class="fas fa-box me-2"></i> Objetos</a></li>
                    <li class="nav-item"><a href="logs.html" class="nav-link"><i class="fas fa-history me-2"></i> Logs</a></li>
                </ul>
            </div>
        </div>

        <div class="flex-grow-1">
            <nav class="top-navbar navbar navbar-expand-lg navbar-dark px-4 py-3">
                <div class="container-fluid">
                    <h5 class="text-white mb-0">Gerenciar Operadores</h5>
                    <div class="d-flex align-items-center">
                        <span class="text-white me-3" id="userGreeting"></span>
                        <button class="btn btn-danger btn-sm" onclick="logout()">
                            <i class="fas fa-sign-out-alt"></i> Sair
                        </button>
                    </div>
                </div>
            </nav>

            <div class="content-area">
                <div class="container-fluid">
                    <div id="successMessage" class="alert alert-success d-none"></div>
                    <div id="errorMessage" class="alert alert-danger d-none"></div>

                    <div class="card admin-card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">Lista de Operadores</h5>
                            <button class="btn btn-success" onclick="openCreateModal()">
                                <i class="fas fa-plus"></i> Novo Operador
                            </button>
                        </div>
                        <div class="card-body">
                            <!-- === FILTRO ULTRA PROTEGIDO === -->
                            <div class="input-group mb-3">
                                <!-- Armadilha forte -->
                                <input type="text" style="position:absolute; opacity:0; height:0; width:0; overflow:hidden;" 
                                       tabindex="-1" autocomplete="off" name="fake_login_trap_2025">

                                <input type="text" 
                                       id="filtro" 
                                       name="filter_operadores_random_98765"
                                       class="form-control" 
                                       placeholder="Filtrar por nome, login ou email..." 
                                       autocomplete="off"
                                       onfocus="this.setAttribute('autocomplete','off'); this.value=this.value;"
                                       onkeyup="if(event.key === 'Enter') listOperadores()">
                                <button class="btn btn-primary" onclick="listOperadores()">
                                    <i class="fas fa-search"></i> Buscar
                                </button>
                            </div>

                            <div class="table-responsive">
                                <table class="table table-hover" id="operadoresTable">
                                    <thead class="table-light">
                                        <tr>
                                            <th>ID</th>
                                            <th>Nome</th>
                                            <th>Login</th>
                                            <th>Email</th>
                                            <th>Permissão</th>
                                            <th>Ações</th>
                                        </tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modais (mantidos iguais) -->
    <!-- ... seus modais create e edit ... -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'http://localhost:3000';
        let currentEditId = null;
        let permissoesList = [];

        // Suas funções showMessage, loadPermissoes, popularSelectPermissao, listOperadores,
        // createOperador, openEditModal, saveOperador, deleteOperador... (mantenha como estão)

        function antiAutofill() {
            const filtro = document.getElementById('filtro');
            if (!filtro) return;
            
            filtro.value = '';
            filtro.setAttribute('autocomplete', 'off');
            filtro.setAttribute('name', 'filter_' + Math.random().toString(36).slice(2));
            
            setTimeout(() => filtro.value = '', 10);
            setTimeout(() => filtro.value = '', 100);
            setTimeout(() => filtro.value = '', 500);
            setTimeout(() => filtro.value = '', 1500);
            setTimeout(() => filtro.value = '', 3000);
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const token = localStorage.getItem('token');
            if (!token) return window.location.href = 'index.html';

            // Limpeza agressiva
            antiAutofill();

            const btnNovo = document.querySelector('.btn-success');
            if (btnNovo && localStorage.getItem('permissao_nome')?.toLowerCase() !== 'admin') {
                btnNovo.style.display = 'none';
            }

            await loadPermissoes();
            listOperadores();

            const name = localStorage.getItem('name');
            if (name) document.getElementById('userGreeting').textContent = `👋 ${name}`;
        });
    </script>
</body>
</html>
