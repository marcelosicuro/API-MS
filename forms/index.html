<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS-LAB - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Mensagens -->
        <div id="successMessage" class="message success"></div>
        <div id="errorMessage" class="message error"></div>

        <!-- TELA 1: LOGIN -->
        <div id="loginScreen" class="screen active">
            <h1>🔐 MS-LAB</h1>
            <h2>Entrar</h2>
            <div class="form-group">
                <label>Login:</label>
                <input type="text" id="loginField" placeholder="Digite seu login">
            </div>
            <div class="form-group">
                <label>Senha:</label>
                <input type="password" id="loginPassword" placeholder="Digite sua senha">
            </div>
            <button onclick="login()">Entrar</button>
            <div class="link-text" onclick="showScreen('registerScreen')">Não tem conta? Registrar</div>
        </div>

        <!-- TELA 2: REGISTRO -->
        <div id="registerScreen" class="screen">
            <h1>📝 MS-LAB</h1>
            <h2>Criar Conta</h2>
            <div class="form-group">
                <label>Login:</label>
                <input type="text" id="registerLogin" placeholder="Digite seu login">
            </div>
            <div class="form-group">
                <label>Senha:</label>
                <input type="password" id="registerPassword" placeholder="Digite sua senha">
            </div>
            <div class="form-group">
                <label>Nome Completo:</label>
                <input type="text" id="registerName" placeholder="Digite seu nome">
            </div>
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="registerEmail" placeholder="Digite seu email">
            </div>
            <button onclick="register()">Registrar</button>
            <div class="link-text" onclick="showScreen('loginScreen')">Já tem conta? Entrar</div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000';

        function showScreen(screenName) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(screenName).classList.add('active');
        }

        function showMessage(message, type) {
            const container = type === 'success' ? document.getElementById('successMessage') : document.getElementById('errorMessage');
            container.textContent = message;
            container.style.display = 'block';
            setTimeout(() => container.style.display = 'none', 3000);
        }

        // ====================== REGISTRO ======================
        async function register() {
            const login   = document.getElementById('registerLogin').value.trim();
            const senha   = document.getElementById('registerPassword').value.trim();
            const nome    = document.getElementById('registerName').value.trim();
            const email   = document.getElementById('registerEmail').value.trim();


            if (!login || !senha || !nome || !email) {
                showMessage('Preencha todos os campos', 'error');
                return;
            }

            if (login.length < 3) {
                showMessage('Login deve ter no mínimo 3 caracteres', 'error');
                return;
            }
            if (senha.length < 6) {
                showMessage('Senha deve ter no mínimo 6 caracteres', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login, senha, nome, email})
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('Operador registrado com sucesso! Faça login.', 'success');
                    // Limpa os campos
                    document.getElementById('registerLogin').value = '';
                    document.getElementById('registerPassword').value = '';
                    document.getElementById('registerName').value = '';
                    document.getElementById('registerEmail').value = '';

                    setTimeout(() => showScreen('loginScreen'), 2000);
                } else {
                    showMessage(data.error || 'Erro ao registrar', 'error');
                }
            } catch (error) {
                showMessage('Erro de conexão: ' + error.message, 'error');
            }
        }

        // ====================== LOGIN ======================
        async function login() {
            const login    = document.getElementById('loginField').value.trim();
            const senha    = document.getElementById('loginPassword').value.trim();

            if (!login || !senha) {
                showMessage('Preencha login e senha', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login, senha })
                });

                const data = await response.json();

                if (response.ok) {
                    // Buscar nome do operador
                    const resUsuario = await fetch(`${API_URL}/getNomeUsuario/${login}`, {
                        method: 'GET',
                        headers: { 
                            'Authorization': `Bearer ${data.token}`,
                            'Content-Type': 'application/json' 
                        }
                    });

                    const usuario = await resUsuario.json();

                    // Registrar Log
                    await fetch(`${API_URL}/incluirLog`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            ip: window.location.hostname, 
                            data: new Date().toISOString(), 
                            pagina: 'Login', 
                            operador: login
                        })
                    });

                    // Salvar no localStorage
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('login', login);
                    localStorage.setItem('name', usuario.nome);
                    
                    showMessage('Login realizado com sucesso!', 'success');

                    setTimeout(() => {
                        window.location.href = 'menu.html';
                    }, 1500);

                } else {
                    showMessage(data.error || 'Credenciais inválidas', 'error');
                }
            } catch (error) {
                showMessage('Erro de conexão: ' + error.message, 'error');
            }
        }

        // Verificar se já está logado
        window.onload = function() {
            if (localStorage.getItem('token')) {
                window.location.href = 'menu.html';
            }
        };
    </script>
</body>
</html>
