<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS-LAB - Logs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
    <div class="d-flex">
        <!-- SIDEBAR -->
        <div class="sidebar col-2">
            <div class="px-3 py-4">
                <h4 class="text-center mb-4">🚀 MS-LAB</h4>
                <ul class="nav flex-column">
                    <li class="nav-item"><a href="menu.html" class="nav-link"><i class="fas fa-home me-2"></i> Dashboard</a></li>
                    <li class="nav-item"><a href="operadores.html" class="nav-link"><i class="fas fa-users me-2"></i> Operadores</a></li>
                    <li class="nav-item"><a href="objetos.html" class="nav-link"><i class="fas fa-box me-2"></i> Objetos</a></li>
                    <li class="nav-item"><a href="logs.html" class="nav-link active"><i class="fas fa-history me-2"></i> Logs</a></li>
                </ul>
            </div>
        </div>

        <!-- CONTEÚDO PRINCIPAL -->
        <div class="flex-grow-1">
            <nav class="top-navbar navbar navbar-expand-lg navbar-dark px-4 py-3">
                <div class="container-fluid">
                    <h5 class="text-white mb-0">Histórico de Logs do Sistema</h5>
                    <div class="d-flex align-items-center">
                        <span class="text-white me-3" id="userGreeting"></span>
                        <button class="btn btn-danger btn-sm" onclick="logout()">
                            <i class="fas fa-sign-out-alt"></i> Sair
                        </button>
                    </div>
                </div>
            </nav>

            <div class="content-area">
                <div class="container-fluid">
                    <div id="successMessage" class="alert alert-success d-none"></div>
                    <div id="errorMessage" class="alert alert-danger d-none"></div>

                    <div class="card admin-card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">Registros de Atividade</h5>
                            <button class="btn btn-primary btn-sm" onclick="loadLogs()" id="btnRefresh">
                                <i class="fas fa-sync"></i> Atualizar
                            </button>
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-hover table-striped" id="logsTable">
                                    <thead>
                                        <tr>
                                            <th>Data/Hora</th>
                                            <th>Operador</th>
                                            <th>Página</th>
                                            <th>IP</th>
                                        </tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js"></script>
    <script>

        function showMessage(message, type) {
            const success = document.getElementById('successMessage');
            const error = document.getElementById('errorMessage');
            success.classList.add('d-none');
            error.classList.add('d-none');

            if (type === 'success') {
                success.textContent = message;
                success.classList.remove('d-none');
            } else {
                error.textContent = message;
                error.classList.remove('d-none');
            }
            setTimeout(() => { success.classList.add('d-none'); error.classList.add('d-none'); }, 4000);
        }

        async function loadLogs() {
            const btn = document.getElementById('btnRefresh');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Carregando...`;

            const token = localStorage.getItem('token');
            if (!token) return window.location.href = 'index.html';

            try {
                const response = await fetch(`${API_URL}/logs/getLog`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.status === 401) {
                    localStorage.clear();
                    window.location.href = 'index.html';
                    return;
                }

                const logs = await response.json();
                const tbody = document.querySelector('#logsTable tbody');
                tbody.innerHTML = '';

                if (logs.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="text-center py-5 text-muted">Nenhum registro encontrado.</td></tr>`;
                    return;
                }

                logs.forEach(log => {
                    const dataFormatada = new Date(log.data).toLocaleString('pt-BR', {
                        day: '2-digit', month: '2-digit', year: 'numeric',
                        hour: '2-digit', minute: '2-digit', second: '2-digit'
                    });

                    const row = `
                        <tr>
                            <td>${dataFormatada}</td>
                            <td><strong>${log.operador}</strong></td>
                            <td>${log.pagina}</td>
                            <td><code>${log.ip}</code></td>
                        </tr>`;
                    tbody.innerHTML += row;
                });

            } catch (error) {
                console.error(error);
                showMessage('Erro ao carregar logs.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        window.onload = function() {
            const token = localStorage.getItem('token');
            if (!token) return window.location.href = 'index.html';

            loadLogs();

            const name = localStorage.getItem('name');
            if (name) document.getElementById('userGreeting').textContent = `👋 ${name}`;
        };
    </script>
</body>
</html>
