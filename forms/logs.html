<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS-LAB - Logs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
    <div class="d-flex">
        <!-- SIDEBAR -->
        <div class="sidebar col-2">
            <div class="px-3 py-4">
                <h4 class="text-center mb-4">🚀 MS-LAB</h4>
                <ul class="nav flex-column">
                    <li class="nav-item"><a href="menu.html" class="nav-link"><i class="fas fa-home me-2"></i> Dashboard</a></li>
                    <li class="nav-item"><a href="operadores.html" class="nav-link"><i class="fas fa-users me-2"></i> Operadores</a></li>
                    <li class="nav-item"><a href="objetos.html" class="nav-link"><i class="fas fa-box me-2"></i> Objetos</a></li>
                    <li class="nav-item"><a href="logs.html" class="nav-link active"><i class="fas fa-history me-2"></i> Logs</a></li>
                </ul>
            </div>
        </div>

        <!-- CONTEÚDO PRINCIPAL -->
        <div class="flex-grow-1">
            <nav class="top-navbar navbar navbar-expand-lg navbar-dark px-4 py-3">
                <div class="container-fluid">
                    <h5 class="text-white mb-0">Histórico de Logs do Sistema</h5>
                    <div class="d-flex align-items-center">
                        <span class="text-white me-3" id="userGreeting"></span>
                        <button class="btn btn-danger btn-sm" onclick="logout()">
                            <i class="fas fa-sign-out-alt"></i> Sair
                        </button>
                    </div>
                </div>
            </nav>

            <div class="content-area">
                <div class="container-fluid">
                    <div id="successMessage" class="alert alert-success d-none"></div>
                    <div id="errorMessage" class="alert alert-danger d-none"></div>

                    <div class="card admin-card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">Registros de Atividade</h5>
                            <div class="d-flex gap-2">
                                <button class="btn btn-outline-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalFiltro">
                                    <i class="fas fa-search"></i> Filtrar
                                </button>
                                <button class="btn btn-primary btn-sm" onclick="loadLogs()" id="btnRefresh">
                                    <i class="fas fa-sync"></i> Atualizar
                                </button>
                            </div>
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-hover table-striped" id="logsTable">
                                    <thead>
                                        <tr>
                                            <th>Data/Hora</th>
                                            <th>Operador</th>
                                            <th>Página</th>
                                            <th>IP</th>
                                        </tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== MODAL DE FILTRO ==================== -->
    <div class="modal fade" id="modalFiltro" tabindex="-1" aria-labelledby="modalFiltroLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalFiltroLabel">🔎 Filtro Avançado de Logs</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="formFiltro">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Data Inicial</label>
                                <input type="datetime-local" class="form-control" id="dataInicio">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Data Final</label>
                                <input type="datetime-local" class="form-control" id="dataFim">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Operador</label>
                                <input type="text" class="form-control" id="filtroOperador" placeholder="Nome do operador">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Página</label>
                                <input type="text" class="form-control" id="filtroPagina" placeholder="Ex: menu.html, objetos.html">
                            </div>

                            <div class="col-12">
                                <label class="form-label">IP</label>
                                <input type="text" class="form-control" id="filtroIP" placeholder="Ex: 192.168.1.100">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-outline-danger" onclick="limparFiltros()">Limpar Filtros</button>
                    <button type="button" class="btn btn-success" onclick="aplicarFiltros()">
                        <i class="fas fa-check"></i> Aplicar Filtro
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js"></script>
    <script>
        let logsOriginais = [];

        function showMessage(message, type) {
            const success = document.getElementById('successMessage');
            const error = document.getElementById('errorMessage');
            success.classList.add('d-none');
            error.classList.add('d-none');

            if (type === 'success') {
                success.textContent = message;
                success.classList.remove('d-none');
            } else {
                error.textContent = message;
                error.classList.remove('d-none');
            }
            setTimeout(() => { 
                success.classList.add('d-none'); 
                error.classList.add('d-none'); 
            }, 4000);
        }

        async function loadLogs() {
            const btn = document.getElementById('btnRefresh');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Carregando...`;

            const token = localStorage.getItem('token');
            if (!token) return window.location.href = 'index.html';

            try {
                const response = await fetch(`${API_URL}/logs/getLog`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.status === 401) {
                    localStorage.clear();
                    window.location.href = 'index.html';
                    return;
                }

                const logs = await response.json();
                logsOriginais = [...logs]; // Salva cópia para filtros

                renderLogs(logs);

            } catch (error) {
                console.error(error);
                showMessage('Erro ao carregar logs.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        function renderLogs(logs) {
            const tbody = document.querySelector('#logsTable tbody');
            tbody.innerHTML = '';

            if (logs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center py-5 text-muted">Nenhum registro encontrado.</td></tr>`;
                return;
            }

            logs.forEach(log => {
                const dataFormatada = new Date(log.data).toLocaleString('pt-BR', {
                    day: '2-digit', month: '2-digit', year: 'numeric',
                    hour: '2-digit', minute: '2-digit', second: '2-digit'
                });

                const row = `
                    <tr>
                        <td>${dataFormatada}</td>
                        <td><strong>${log.operador}</strong></td>
                        <td>${log.pagina}</td>
                        <td><code>${log.ip}</code></td>
                    </tr>`;
                tbody.innerHTML += row;
            });
        }

        function aplicarFiltros() {
            const dataInicio = document.getElementById('dataInicio').value;
            const dataFim = document.getElementById('dataFim').value;
            const operador = document.getElementById('filtroOperador').value.toLowerCase().trim();
            const pagina = document.getElementById('filtroPagina').value.toLowerCase().trim();
            const ip = document.getElementById('filtroIP').value.trim();

            const filtrados = logsOriginais.filter(log => {
                let ok = true;

                if (dataInicio) ok = ok && new Date(log.data) >= new Date(dataInicio);
                if (dataFim) ok = ok && new Date(log.data) <= new Date(dataFim);
                if (operador) ok = ok && log.operador.toLowerCase().includes(operador);
                if (pagina) ok = ok && log.pagina.toLowerCase().includes(pagina);
                if (ip) ok = ok && log.ip.includes(ip);

                return ok;
            });

            renderLogs(filtrados);
            bootstrap.Modal.getInstance(document.getElementById('modalFiltro')).hide();
        }

        function limparFiltros() {
            document.getElementById('formFiltro').reset();
            renderLogs(logsOriginais);
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        window.onload = function() {
            const token = localStorage.getItem('token');
            if (!token) return window.location.href = 'index.html';

            loadLogs();

            const name = localStorage.getItem('name');
            if (name) document.getElementById('userGreeting').textContent = `👋 ${name}`;
        };
    </script>
</body>
</html>
